<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription — PsychoEval</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">🧠</span>
        <span class="logo-text">PsychoEval</span>
      </div>
      <h1>Créer un compte</h1>
      <p>Rejoignez PsychoEval gratuitement</p>

      <div id="error" class="alert alert-error"></div>
      <div id="success" class="alert alert-success"></div>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" placeholder="Marie" required />
          </div>
          <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" placeholder="Dupont" required />
          </div>
        </div>
        <div class="form-group">
          <label for="email">Adresse e-mail professionnelle</label>
          <input type="email" id="email" placeholder="vous@exemple.fr" required />
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="8 caractères minimum" minlength="8" required />
        </div>
        <div class="form-group">
          <label for="password2">Confirmer le mot de passe</label>
          <input type="password" id="password2" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Créer mon compte</button>
      </form>

      <div class="auth-footer">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');

      const prenom = document.getElementById('prenom').value.trim();
      const nom = document.getElementById('nom').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (password !== password2) {
        showError('Les mots de passe ne correspondent pas.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Création...';

      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { prenom, nom } }
      });

      if (error) {
        showError(error.message === 'User already registered'
          ? 'Un compte existe déjà avec cet email.'
          : 'Une erreur est survenue. Réessayez.');
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
      } else {
        document.getElementById('registerForm').style.display = 'none';
        showSuccess('Compte créé ! Vérifiez votre email pour confirmer votre inscription, puis connectez-vous.');
      }
    });
  </script>
</body>
</html>
