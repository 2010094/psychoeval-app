<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Connexion — PsychoEval</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">🧠</span>
        <span class="logo-text">PsychoEval</span>
      </div>
      <h1>Connexion</h1>
      <p>Accédez à votre espace praticien</p>

      <div id="error" class="alert alert-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" placeholder="vous@exemple.fr" required />
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Se connecter</button>
      </form>

      <div class="auth-footer">
        Pas encore de compte ? <a href="inscription.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    // Si déjà connecté, aller au dashboard
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError('Email ou mot de passe incorrect.');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
